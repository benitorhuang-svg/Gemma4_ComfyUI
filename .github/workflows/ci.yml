name: Gemma4_CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'docker/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'docker/**'
      - 'Makefile'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
  GIT_CLONE_PROTECTION_ACTIVE: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env
        run: cp deploy/.env.example .env
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.10"
      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env
        run: cp deploy/.env.example .env
      - name: Check Docker Compose Config
        run: docker compose config -q
      - name: Dockerfile Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.comfyui
          ignore: DL3008,DL3013,DL3015,DL3059,DL4006
